name: Dynamic Port Scan (IPv4/IPv6)

on:
  workflow_dispatch:
    inputs:
      target_ip:
        description: '目标 IP 地址 (支持 IPv4 或 IPv6)'
        required: true
        default: '1.2.3.4' # 默认值，你可以修改
      start_port:
        description: '起始端口'
        required: true
        default: '100'
      end_port:
        description: '结束端口'
        required: true
        default: '20000'

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install nmap
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap

      - name: Run Smart Port Scan
        run: |
          # ================= 获取动态输入 =================
          # 使用 github.event.inputs 获取用户在界面上输入的值
          TARGET_IP="${{ github.event.inputs.target_ip }}"
          START_PORT="${{ github.event.inputs.start_port }}"
          END_PORT="${{ github.event.inputs.end_port }}"
          # ===============================================

          echo "📥 接收到的输入:"
          echo "   目标 IP: $TARGET_IP"
          echo "   端口范围: $START_PORT - $END_PORT"

          # 自动检测 IP 版本
          IP_VERSION_FLAG=""
          if [[ "$TARGET_IP" == *":"* ]]; then
              echo "🌐 检测到 IPv6 地址"
              IP_VERSION_FLAG="-6"
          else
              echo "🌐 检测到 IPv4 地址"
              IP_VERSION_FLAG="-4"
          fi

          echo "🚀 开始扫描..."
          
          CLOSED_PORTS_FILE="closed_ports.txt"
          touch $CLOSED_PORTS_FILE

          # 执行扫描
          # 注意：如果端口范围非常大，GitHub Actions 可能会超时 (最大运行时间 6 小时)
          echo "正在执行 Nmap 扫描 (这可能需要几分钟)..."
          nmap $IP_VERSION_FLAG -p $START_PORT-$END_PORT -T4 -Pn -oG nmap_output.txt $TARGET_IP

          NMAP_EXIT_CODE=$?
          
          echo "正在分析结果..."
          
          # 提取 closed 或 filtered 的端口
          grep -oP '\d+/(?:closed|filtered)/tcp' nmap_output.txt | cut -d'/' -f1 > $CLOSED_PORTS_FILE || true
          
          COUNT_CLOSED=$(wc -l < $CLOSED_PORTS_FILE)
          
          # 简单计算一下扫描到的端口总数用于判断
          TOTAL_FOUND=$(grep -cE '(open|closed|filtered)/tcp' nmap_output.txt || echo 0)

          echo "----------------------------------------"
          if [ "$COUNT_CLOSED" -eq 0 ] && [ "$TOTAL_FOUND" -gt 0 ]; then
              echo "✅ 惊人！所有扫描端口 ($START_PORT-$END_PORT) 均显示为 OPEN！"
              echo "📝 保存全开报告..."
              {
                echo "扫描时间: $(date)"
                echo "目标 IP: $TARGET_IP"
                echo "端口范围: $START_PORT-$END_PORT"
                echo "协议版本: ${IP_VERSION_FLAG:-Auto}"
                echo "结果: 所有端口已激活"
                echo "----------------------------------------"
                cat nmap_output.txt
              } > full_open_report.txt
              
          else
              if [ "$TOTAL_FOUND" -eq 0 ]; then
                  echo "⚠️ 警告：未检测到任何端口状态。"
                  echo "可能原因：主机不可达、防火墙丢弃所有包、或 IP 输入错误。"
                  echo "请查看 nmap_output.txt 中的原始报错信息。"
              else
                  echo "⚠️ 发现 $COUNT_CLOSED 个未激活 (Closed/Filtered) 的端口。"
                  echo "📋 未激活端口列表 (前 50 个):"
                  head -n 50 $CLOSED_PORTS_FILE
                  if [ "$COUNT_CLOSED" -gt 50 ]; then
                      echo "... 还有 $((COUNT_CLOSED - 50)) 个端口未列出。"
                  fi
              fi
              
              # 生成详细报告
              {
                echo "扫描时间: $(date)"
                echo "目标 IP: $TARGET_IP"
                echo "端口范围: $START_PORT-$END_PORT"
                echo "协议版本: ${IP_VERSION_FLAG:-Auto}"
                echo "未激活端口数: $COUNT_CLOSED"
                echo "----------------------------------------"
                echo "未激活端口详情:"
                cat $CLOSED_PORTS_FILE
                echo "----------------------------------------"
                echo "完整 Nmap 输出:"
                cat nmap_output.txt
              } > detailed_report.txt
          fi
          echo "----------------------------------------"

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: port-scan-results-${{ github.run_id }} # 文件名带上运行ID以防冲突
          path: |
            nmap_output.txt
            closed_ports.txt
            full_open_report.txt
            detailed_report.txt
          retention-days: 5


