name: Dynamic Port Scan with Loops

on:
  workflow_dispatch:
    inputs:
      target_ip:
        description: '目标 IP 地址 (支持 IPv4 或 IPv6)'
        required: true
        default: '1.2.3.4'
      start_port:
        description: '起始端口'
        required: true
        default: '100'
      end_port:
        description: '结束端口'
        required: true
        default: '20000'
      loop_count:
        description: '循环扫描次数 (例如：3 表示从头到尾扫 3 遍)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '5'
          - '10'
          - '20'

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install nmap
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap

      - name: Run Loop Scan
        run: |
          # ================= 获取动态输入 =================
          TARGET_IP="${{ github.event.inputs.target_ip }}"
          START_PORT="${{ github.event.inputs.start_port }}"
          END_PORT="${{ github.event.inputs.end_port }}"
          LOOP_COUNT="${{ github.event.inputs.loop_count }}"
          # ===============================================

          echo "📥 任务配置:"
          echo "   目标 IP: $TARGET_IP"
          echo "   端口范围: $START_PORT - $END_PORT"
          echo "   循环次数: $LOOP_COUNT"
          
          # 自动检测 IP 版本
          IP_VERSION_FLAG=""
          if [[ "$TARGET_IP" == *":"* ]]; then
              echo "🌐 检测到 IPv6 地址，启用 -6 模式"
              IP_VERSION_FLAG="-6"
          else
              echo "🌐 检测到 IPv4 地址，启用 -4 模式"
              IP_VERSION_FLAG="-4"
          fi

          # 初始化统计文件
          SUMMARY_FILE="scan_summary.txt"
          echo "扫描总结报告" > $SUMMARY_FILE
          echo "生成时间: $(date)" >> $SUMMARY_FILE
          echo "目标 IP: $TARGET_IP" >> $SUMMARY_FILE
          echo "端口范围: $START_PORT-$END_PORT" >> $SUMMARY_FILE
          echo "总循环次数: $LOOP_COUNT" >> $SUMMARY_FILE
          echo "========================================" >> $SUMMARY_FILE

          # 开始循环
          for ((i=1; i<=LOOP_COUNT; i++)); do
              echo ""
              echo "🔄 [第 $i / $LOOP_COUNT 次] 开始扫描..."
              echo "----------------------------------------" >> $SUMMARY_FILE
              echo ">>> 第 $i 次扫描开始时间: $(date)" >> $SUMMARY_FILE

              CURRENT_OUTPUT="nmap_run_${i}.txt"
              CURRENT_CLOSED="closed_ports_run_${i}.txt"

              # 执行 Nmap
              # 注意：如果单次扫描时间过长，多次循环可能会导致总时长超过 GitHub Actions 的 6 小时限制
              nmap $IP_VERSION_FLAG -p $START_PORT-$END_PORT -T4 -Pn -oG $CURRENT_OUTPUT $TARGET_IP
              
              NMAP_STATUS=$?
              
              if [ $NMAP_STATUS -ne 0 ]; then
                  echo "::warning::第 $i 次扫描 Nmap 返回非零状态码 ($NMAP_STATUS)，可能遇到网络问题。"
                  echo ">>> 第 $i 次扫描异常退出，状态码: $NMAP_STATUS" >> $SUMMARY_FILE
              fi

              # 提取本次的关闭端口
              grep -oP '\d+/(?:closed|filtered)/tcp' $CURRENT_OUTPUT | cut -d'/' -f1 > $CURRENT_CLOSED || true
              COUNT_CLOSED=$(wc -l < $CURRENT_CLOSED)
              
              TOTAL_FOUND=$(grep -cE '(open|closed|filtered)/tcp' $CURRENT_OUTPUT || echo 0)

              echo "✅ 第 $i 次扫描完成。"
              echo "   - 发现未激活端口数: $COUNT_CLOSED"
              echo "   - 扫描到的总端口状态数: $TOTAL_FOUND"

              # 记录到总结文件
              echo ">>> 第 $i 次扫描结束时间: $(date)" >> $SUMMARY_FILE
              echo ">>> 第 $i 次结果：未激活端口数 = $COUNT_CLOSED" >> $SUMMARY_FILE
              
              if [ "$COUNT_CLOSED" -eq 0 ] && [ "$TOTAL_FOUND" -gt 0 ]; then
                  echo "   🎉 本轮结果：所有端口 OPEN!"
                  echo "   状态: ✅ 全开" >> $SUMMARY_FILE
              elif [ "$TOTAL_FOUND" -eq 0 ]; then
                  echo "   ⚠️ 本轮结果：无数据 (可能主机不可达)"
                  echo "   状态: ⚠️ 无数据" >> $SUMMARY_FILE
              else
                  echo "   ⚠️ 本轮结果：有 $COUNT_CLOSED 个端口未激活"
                  echo "   状态: ⚠️ 有封闭端口 (详见附件 closed_ports_run_${i}.txt)" >> $SUMMARY_FILE
              fi
              
              # 如果是最后一次，或者用户只跑一次，我们可以生成一个合并的详细报告
              if [ "$i" -eq "$LOOP_COUNT" ]; then
                  echo ""
                  echo "🏁 所有循环结束，正在生成最终报告..."
                  
                  FINAL_REPORT="final_detailed_report.txt"
                  {
                    echo "=== 最终详细报告 ==="
                    echo "目标: $TARGET_IP"
                    echo "日期: $(date)"
                    echo ""
                    echo "--- 每次扫描的未激活端口统计 ---"
                    for ((j=1; j<=LOOP_COUNT; j++)); do
                        c=$(wc -l < "closed_ports_run_${j}.txt")
                        echo "第 $j 次: $c 个未激活端口"
                    done
                    echo ""
                    echo "--- 最后一次扫描的完整 Nmap 输出 ---"
                    cat $CURRENT_OUTPUT
                    echo ""
                    echo "--- 最后一次扫描的未激活端口列表 ---"
                    cat $CURRENT_CLOSED
                  } > $FINAL_REPORT
              fi
          done

          echo ""
          echo "📊 扫描总结:"
          cat $SUMMARY_FILE

      - name: Upload All Results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results-loop-${{ github.run_id }}
          path: |
            scan_summary.txt
            final_detailed_report.txt
            nmap_run_*.txt
            closed_ports_run_*.txt
          retention-days: 5
